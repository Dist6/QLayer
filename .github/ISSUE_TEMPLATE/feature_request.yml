name: Feature request
description: Suggest a focused improvement to QLayer.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Explain the smallest useful behavior from a user's perspective.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This proposal does not require telemetry, credential access, traffic interception, or arbitrary command execution.
          required: true
