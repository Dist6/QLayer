name: Bug report
description: Report a reproducible problem in QLayer.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, tokens, private chat content, or sensitive paths.
  - type: input
    id: version
    attributes:
      label: QLayer version
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Open...\n2. Select...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Additional context
      description: Include sanitized logs or screenshots only when safe.
